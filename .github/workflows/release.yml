name: Publish Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 要发布的 tag，例如 v1.0.0-beta.1。
        required: true
        type: string
      ref:
        description: 要发布的 branch、tag 或 commit。留空时使用 tag。
        required: false
        type: string

permissions:
  contents: write

jobs:
  verify:
    name: Verify release
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Resolve ref
        id: release_ref
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $ref = "${{ inputs.ref }}"
          } else {
            $ref = $tag
          }
          if (-not $ref) {
            $ref = $tag
          }
          if (-not $tag) {
            throw "Release tag is required."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          if ($ref) {
            "ref=$ref" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_ref.outputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Rust
        shell: pwsh
        run: rustup show

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Verify LiliaGithub
        run: corepack yarn verify

      - name: Show sccache stats
        shell: pwsh
        run: "& $env:SCCACHE_PATH --show-stats"

  publish-windows:
    name: Publish Windows bundle
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Resolve ref
        id: release_ref
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $ref = "${{ inputs.ref }}"
          } else {
            $ref = $tag
          }
          if (-not $ref) {
            $ref = $tag
          }
          if (-not $tag) {
            throw "Release tag is required."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          if ($ref) {
            "ref=$ref" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_ref.outputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Rust
        shell: pwsh
        run: rustup show

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Validate release signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          $required = @(
            "TAURI_SIGNING_PRIVATE_KEY",
            "TAURI_UPDATER_PUBKEY",
            "WINDOWS_CERTIFICATE",
            "WINDOWS_CERTIFICATE_PASSWORD",
            "WINDOWS_CERTIFICATE_THUMBPRINT"
          )
          $missing = @()
          foreach ($name in $required) {
            if (-not [Environment]::GetEnvironmentVariable($name)) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            throw "Missing release signing secrets: $($missing -join ', ')"
          }

      - name: Import Windows signing certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "liliagithub-code-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $password | Out-Null

      - name: Write release updater config
        shell: pwsh
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          $config = @{
            bundle = @{
              createUpdaterArtifacts = $true
              windows = @{
                certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT
                timestampUrl = "http://timestamp.digicert.com"
              }
            }
            plugins = @{
              updater = @{
                pubkey = $env:TAURI_UPDATER_PUBKEY
                endpoints = @(
                  "https://github.com/sena-nana/LiliaGithub/releases/latest/download/latest.json"
                )
              }
            }
          }
          $config | ConvertTo-Json -Depth 10 | Set-Content -Path "src-tauri/tauri.release.conf.json" -Encoding utf8

      - name: Build and publish Windows bundle
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tauriScript: corepack yarn tauri
          args: --config src-tauri/tauri.release.conf.json
          tagName: ${{ steps.release_ref.outputs.tag }}
          releaseName: LiliaGithub ${{ steps.release_ref.outputs.tag }}
          releaseDraft: true
          generateReleaseNotes: true

      - name: Show sccache stats
        shell: pwsh
        run: "& $env:SCCACHE_PATH --show-stats"
