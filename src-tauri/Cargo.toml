[package]
name = "lilia_github"
version = "0.1.0-alpha.2"
description = "A Tauri desktop app for local GitHub workspace and repository management."
authors = ["sena-nana"]
homepage = "https://github.com/sena-nana/LiliaGithub"
repository = "https://github.com/sena-nana/LiliaGithub"
edition = "2021"

[lib]
name = "lilia_github_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tokio = { version = "1", default-features = false, features = ["rt"] }
tauri = { version = "2", features = ["image-png"] }
tauri-plugin-opener = "2"
tauri-plugin-store = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls-native-roots", "system-proxy"] }
keyring = "4.0.1"
keyring-core = "1.0.0"
libc = "0.2"
zip = { version = "8.6.0", default-features = false, features = ["deflate"] }
